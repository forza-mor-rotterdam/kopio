name: Build PHAR and publish

on:
  push:
    branches: [ "main" ]
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-
    - name: Download Box
      run: wget https://github.com/box-project/box/releases/download/4.5.1/box.phar
    - name: Set phar.readonly=0
      run: sudo sh -c 'echo "phar.readonly=0" > /etc/php/8.3/cli/conf.d/99-phar.ini'
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
    - name: Dump envs via composer
      run: composer dump-env prod
    - name: Remove dev cache
      run: rm -Rf var/cache/dev
    - name: Cache warmup
      run: php new-bin/console cache:warmup
    - name: Run Box
      #env:
        # see https://github.com/box-project/box/issues/988
        #BOX_ALLOW_XDEBUG: '1'
      run: php box.phar compile
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kopio.phar
        path: build/kopio.phar
  upload_release:
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'release'
    steps:
      - name: Download artifact from build step
        uses: actions/download-artifact@v4
        with:
          name: kopio.phar
          path: .
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            kopio.phar
